# Refer: https://evilmartians.com/chronicles/rubocoping-with-legacy-bring-your-ruby-code-up-to-standard

inherit_mode:
  merge:
    - Exclude

require:
  - standard

inherit_gem:
  standard: config/ruby-3.2.yml

inherit_from:
  - .rubocop_rails.yml
  - .rubocop_strict.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - bin/**/*
    - config/**/*
    - db/schema.rb
    - db/migrate/*.rb
    - node_modules/**/*
    - tmp/**/*
    - vendor/**/*
    - spec/spec_helper.rb
